version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: dpi-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  server:
    build: ./server
    container_name: dpi-server
    env_file:
      - ./server/.env.docker
    ports:
      - "5000:5000"
    depends_on:
      - redis
    restart: unless-stopped

  client:
    build: ./client
    container_name: dpi-client
    ports:
      - "8080:80"
    depends_on:
      - server
    restart: unless-stopped